<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>틈새연수 신청</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a18;
    --paper: #f7f4ee;
    --paper2: #efebe2;
    --paper3: #e6e1d6;
    --accent: #c0392b;
    --accent2: #e8c547;
    --muted: #7a7368;
    --border: rgba(26,26,24,0.12);
    --border2: rgba(26,26,24,0.22);
    --success: #2d6a4f;
    --warning: #9c6d00;
    --danger: #c0392b;
    --radius: 4px;
    --radius-lg: 8px;
    --shadow: 0 2px 16px rgba(26,26,24,0.10);
    --shadow-lg: 0 8px 40px rgba(26,26,24,0.18);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%231a1a18' fill-opacity='0.025'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; padding: 0 1.5rem 4rem; }

  /* Header */
  .site-header {
    padding: 3rem 0 2rem;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 2.5rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .site-kicker {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }
  .site-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .site-title span { color: var(--accent); }

  .btn-add {
    font-family: 'Pretendard', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.05em;
    padding: 11px 22px;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: var(--radius);
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    white-space: nowrap;
  }
  .btn-add:hover { background: #333; }
  .btn-add:active { transform: scale(0.97); }

  /* Loading */
  .loading-bar {
    position: fixed; top: 0; left: 0; right: 0; height: 3px;
    background: var(--accent);
    z-index: 999;
    animation: loadbar 1.2s ease infinite;
    display: none;
  }
  .loading-bar.active { display: block; }
  @keyframes loadbar { 0%{width:0;opacity:1} 70%{width:80%;opacity:1} 100%{width:100%;opacity:0} }

  /* Course list */
  .course-list { display: flex; flex-direction: column; gap: 1.25rem; }

  .empty-state {
    text-align: center;
    padding: 5rem 2rem;
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius-lg);
    color: var(--muted);
  }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state p { font-size: 15px; }

  /* Course Card */
  .course-card {
    background: #fff;
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow);
    animation: fadeUp 0.35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    padding: 1.25rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
  }
  .card-title-row { flex: 1; }
  .card-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 20px;
    font-weight: 700;
    line-height: 1.3;
    margin-bottom: 6px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .card-title:hover { color: var(--accent); }
  .card-title-hint {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 4px;
    opacity: 0.7;
  }
  .card-meta {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--muted);
  }
  .card-meta-item { display: flex; align-items: center; gap: 4px; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 99px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .badge-dot { width: 6px; height: 6px; border-radius: 50%; }
  .badge-open { background: #d4edda; color: #155724; }
  .badge-open .badge-dot { background: #28a745; animation: pulse 1.5s infinite; }
  .badge-wait { background: #fff3cd; color: #7a5800; }
  .badge-wait .badge-dot { background: #f0ad00; }
  .badge-full { background: #f8d7da; color: #721c24; }
  .badge-full .badge-dot { background: #dc3545; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .card-body { padding: 1rem 1.5rem; }

  .progress-wrap { margin-bottom: 6px; }
  .progress-track {
    height: 6px;
    background: var(--paper2);
    border-radius: 99px;
    overflow: hidden;
    margin-bottom: 5px;
  }
  .progress-fill {
    height: 100%;
    background: var(--ink);
    border-radius: 99px;
    transition: width 0.5s ease;
  }
  .progress-fill.full { background: var(--accent); }
  .progress-label { font-size: 12px; color: var(--muted); display: flex; justify-content: space-between; }
  .countdown-label { color: var(--warning); font-weight: 600; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    gap: 8px;
    padding: 0.85rem 1.5rem;
    background: var(--paper);
    border-top: 1px solid var(--border);
  }

  .btn {
    font-family: 'Pretendard', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 9px 18px;
    border-radius: var(--radius);
    border: 1px solid var(--border2);
    background: #fff;
    color: var(--ink);
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .btn:hover { background: var(--paper2); }
  .btn:active { transform: scale(0.97); }
  .btn-apply {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn-apply:hover { background: #333; }
  .btn-apply:disabled, .btn-apply.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }
  .btn-outline-accent { border-color: var(--accent); color: var(--accent); }
  .btn-outline-accent:hover { background: #fdf0ee; }
  .btn-delete { border-color: var(--danger); color: var(--danger); background: #fff; }
  .btn-delete:hover { background: #fdf0ee; }
  .delete-confirm-box {
    margin-top: 1.25rem;
    padding: 1rem 1.1rem;
    border: 1.5px solid var(--danger);
    border-radius: var(--radius-lg);
    background: #fff8f7;
  }
  .delete-confirm-box p { font-size: 13px; color: #721c24; line-height: 1.6; margin-bottom: 0.85rem; }
  .delete-confirm-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-delete-confirm {
    font-family: 'Pretendard', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 9px 18px;
    border-radius: var(--radius);
    border: none;
    background: var(--danger);
    color: #fff;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s;
  }
  .btn-delete-confirm:hover { opacity: 0.85; }
  .btn-delete-confirm:active { transform: scale(0.97); }

  /* Instructor tabs */
  .inst-tabs {
    display: flex; gap: 0; margin-bottom: 1.25rem;
    border-bottom: 2px solid var(--border2);
  }
  .inst-tab {
    font-family: 'Pretendard', sans-serif;
    font-size: 13px; font-weight: 500;
    padding: 10px 18px;
    border: none; background: none; cursor: pointer;
    color: var(--muted);
    border-bottom: 2px solid transparent;
    margin-bottom: -2px;
    transition: color 0.15s, border-color 0.15s;
    border-radius: 0;
  }
  .inst-tab:hover { color: var(--ink); background: none; }
  .inst-tab.active { color: var(--ink); border-bottom-color: var(--ink); font-weight: 600; }

  /* Detail modal */
  .detail-section { margin-bottom: 1.25rem; }
  .detail-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--muted); margin-bottom: 6px;
  }
  .detail-desc {
    font-size: 15px; line-height: 1.8; color: var(--ink);
    white-space: pre-wrap; word-break: break-word;
    background: var(--paper); border-radius: var(--radius);
    padding: 1rem 1.1rem; border: 1px solid var(--border);
  }
  .detail-meta-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .detail-meta-card {
    background: var(--paper); border-radius: var(--radius);
    padding: 10px 14px; border: 1px solid var(--border);
  }
  .detail-meta-card .dm-label { font-size: 11px; color: var(--muted); margin-bottom: 3px; }
  .detail-meta-card .dm-value { font-size: 14px; font-weight: 600; color: var(--ink); }
  .detail-progress-track {
    height: 8px; background: var(--paper2); border-radius: 99px; overflow: hidden; margin-bottom: 5px;
  }
  .detail-progress-fill {
    height: 100%; background: var(--ink); border-radius: 99px; transition: width 0.5s;
  }
  .detail-progress-fill.full { background: var(--accent); }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(26,26,24,0.55);
    backdrop-filter: blur(3px);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    animation: fadeIn 0.2s ease forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .modal {
    background: #fff;
    border-radius: 12px;
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: scaleIn 0.22s ease both;
  }
  @keyframes scaleIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .modal-header {
    padding: 1.5rem 1.5rem 1rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .modal-title {
    font-family: 'Nanum Myeongjo', serif;
    font-size: 20px;
    font-weight: 700;
  }
  .modal-close {
    width: 30px; height: 30px;
    display: flex; align-items: center; justify-content: center;
    border: none; background: none; cursor: pointer;
    color: var(--muted); border-radius: var(--radius);
    font-size: 18px;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--paper2); }

  .modal-body { padding: 1.25rem 1.5rem; }
  .modal-footer {
    padding: 1rem 1.5rem;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    justify-content: flex-end;
  }

  .field { margin-bottom: 1.1rem; }
  .field:last-child { margin-bottom: 0; }
  .field label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.04em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%;
    font-family: 'Pretendard', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    background: var(--paper);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    border-color: var(--ink);
    box-shadow: 0 0 0 3px rgba(26,26,24,0.08);
    background: #fff;
  }
  .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .req { color: var(--accent); }

  .msg { font-size: 13px; padding: 10px 12px; border-radius: var(--radius); margin-top: 1rem; }
  .msg-error { background: #fdf2f2; color: var(--danger); border: 1px solid #f5c6c6; }
  .msg-success { background: #f0faf4; color: var(--success); border: 1px solid #b8e0c8; }

  /* Registrant list */
  .reg-count-bar {
    background: var(--paper2);
    border-radius: var(--radius);
    padding: 12px 14px;
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 14px;
  }
  .reg-count-bar strong { font-size: 22px; font-weight: 700; }

  .reg-list { display: flex; flex-direction: column; gap: 6px; }
  .reg-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--paper);
    border-radius: var(--radius);
    font-size: 14px;
    border: 1px solid var(--border);
  }
  .reg-num {
    width: 26px; height: 26px;
    border-radius: 50%;
    background: var(--ink);
    color: var(--paper);
    font-size: 11px;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .reg-name { flex: 1; font-weight: 500; }
  .reg-time { font-size: 11px; color: var(--muted); }

  .empty-reg {
    text-align: center;
    padding: 2rem;
    color: var(--muted);
    font-size: 14px;
  }

  @media (max-width: 540px) {
    .field-row { grid-template-columns: 1fr; }
    .site-header { flex-direction: column; align-items: flex-start; }
    .card-top { flex-direction: column; }
  }
</style>
</head>
<body>

<div class="loading-bar" id="loadingBar"></div>

<div class="wrap">
  <header class="site-header">
    <div class="site-header-left">
      <div class="site-kicker">연수 관리 시스템</div>
      <h1 class="site-title">틈새연수 <span>신청</span></h1>
    </div>
    <button class="btn-add" onclick="openAddModal()">＋ 강의 추가</button>
  </header>

  <div class="course-list" id="courseList">
    <div class="empty-state">
      <div class="empty-icon">⏳</div>
      <p>강의 목록을 불러오는 중...</p>
    </div>
  </div>
</div>

<!-- 강의 추가 모달 -->
<div class="modal-backdrop" id="addModal" style="display:none" onclick="backdropClose(event,'addModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">새 강의 추가</div>
      <button class="modal-close" onclick="closeModal('addModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>강사 비밀번호 <span class="req">*</span></label>
        <input type="password" id="f-pass" placeholder="강사만 아는 비밀번호">
      </div>
      <div class="field">
        <label>강의 이름 <span class="req">*</span></label>
        <input type="text" id="f-name" placeholder="강의 이름을 입력하세요">
      </div>
      <div class="field">
        <label>강의 내용 <span class="req">*</span></label>
        <textarea id="f-desc" placeholder="강의에 대한 설명을 입력하세요"></textarea>
      </div>
      <div class="field">
        <label>수강자 수 제한 <span class="req">*</span></label>
        <input type="number" id="f-limit" min="1" placeholder="예: 30">
      </div>
      <div class="field-row">
        <div class="field">
          <label>수강신청 시작 날짜 <span class="req">*</span></label>
          <input type="date" id="f-openDate">
        </div>
        <div class="field">
          <label>수강신청 시작 시간 <span class="req">*</span></label>
          <select id="f-openTime"></select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>강의 날짜 <span class="req">*</span></label>
          <input type="date" id="f-lectureDate">
        </div>
        <div class="field">
          <label>강의 시작 시간 <span class="req">*</span></label>
          <select id="f-lectureTime"></select>
        </div>
      </div>
      <div id="addMsg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('addModal')">취소</button>
      <button class="btn btn-apply" onclick="saveCourse()">저장하기</button>
    </div>
  </div>
</div>

<!-- 수강신청 모달 -->
<div class="modal-backdrop" id="applyModal" style="display:none" onclick="backdropClose(event,'applyModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="applyModalTitle">수강신청</div>
      <button class="modal-close" onclick="closeModal('applyModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="field">
        <label>이름 <span class="req">*</span></label>
        <input type="text" id="a-name" placeholder="성명을 입력하세요" onkeydown="if(event.key==='Enter')submitApply()">
      </div>
      <div id="applyMsg"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('applyModal')">취소</button>
      <button class="btn btn-apply" onclick="submitApply()">신청하기</button>
    </div>
  </div>
</div>

<!-- 강사 확인 모달 -->
<div class="modal-backdrop" id="instModal" style="display:none" onclick="backdropClose(event,'instModal')">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <div class="modal-title" id="instModalTitle">강사 확인</div>
      <button class="modal-close" onclick="closeModal('instModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="instPassSection">
        <div class="field">
          <label>강사 비밀번호</label>
          <input type="password" id="i-pass" placeholder="비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')verifyInstructor()">
        </div>
        <div id="instMsg"></div>
      </div>
      <div id="instDashboard" style="display:none">
        <div class="inst-tabs">
          <button class="inst-tab active" onclick="switchTab('list')">수강신청자 목록</button>
          <button class="inst-tab" onclick="switchTab('edit')">강의 설정 수정</button>
        </div>
        <div id="instListSection"></div>
        <div id="instEditSection" style="display:none">
          <div class="field"><label>강의 이름 <span class="req">*</span></label><input type="text" id="e-name"></div>
          <div class="field"><label>강의 내용 <span class="req">*</span></label><textarea id="e-desc"></textarea></div>
          <div class="field"><label>수강자 수 제한 <span class="req">*</span></label><input type="number" id="e-limit" min="1"></div>
          <div class="field-row">
            <div class="field">
              <label>수강신청 시작 날짜 <span class="req">*</span></label>
              <input type="date" id="e-openDate">
            </div>
            <div class="field">
              <label>수강신청 시작 시간 <span class="req">*</span></label>
              <select id="e-openTime"></select>
            </div>
          </div>
          <div class="field-row">
            <div class="field"><label>강의 날짜 <span class="req">*</span></label><input type="date" id="e-lectureDate"></div>
            <div class="field"><label>강의 시작 시간 <span class="req">*</span></label><select id="e-lectureTime"></select></div>
          </div>
          <div id="editMsg"></div>
          <div style="display:flex;justify-content:flex-end;margin-top:1rem;">
            <button class="btn btn-apply" onclick="saveEdit()">수정 저장</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer" id="instFooter">
      <button class="btn" onclick="closeModal('instModal')">닫기</button>
      <button class="btn btn-apply" id="instVerifyBtn" onclick="verifyInstructor()">확인</button>
    </div>
  </div>
</div>

<!-- 강의 상세 모달 -->
<div class="modal-backdrop" id="detailModal" style="display:none" onclick="backdropClose(event,'detailModal')">
  <div class="modal" style="max-width:560px;">
    <div class="modal-header">
      <div class="modal-title" id="detailModalTitle"></div>
      <button class="modal-close" onclick="closeModal('detailModal')">✕</button>
    </div>
    <div class="modal-body" id="detailModalBody"></div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('detailModal')">닫기</button>
    </div>
  </div>
</div>

<!-- 강의 삭제 모달 -->
<div class="modal-backdrop" id="deleteModal" style="display:none" onclick="backdropClose(event,'deleteModal')">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="deleteModalTitle">강의 삭제</div>
      <button class="modal-close" onclick="closeModal('deleteModal')">✕</button>
    </div>
    <div class="modal-body">
      <div id="deletePassSection">
        <div class="field">
          <label>강사 비밀번호 <span class="req">*</span></label>
          <input type="password" id="d-pass" placeholder="강사 비밀번호를 입력하세요" onkeydown="if(event.key==='Enter')verifyDelete()">
        </div>
        <div id="deleteMsg"></div>
      </div>
      <div id="deleteConfirmSection" style="display:none">
        <div class="delete-confirm-box">
          <p>강의를 삭제하면 수강신청자 목록을 포함한 모든 데이터가 영구적으로 사라집니다.<br>정말 삭제하시겠습니까?</p>
          <div class="delete-confirm-actions">
            <button class="btn" onclick="closeModal('deleteModal')">취소</button>
            <button class="btn-delete-confirm" onclick="confirmDelete()">네, 삭제합니다</button>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer" id="deleteFooter">
      <button class="btn" onclick="closeModal('deleteModal')">취소</button>
      <button class="btn btn-delete" id="deleteVerifyBtn" onclick="verifyDelete()">확인</button>
    </div>
  </div>
</div>

<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ====================================================
// Supabase 설정 - 환경변수에서 주입됨
// ====================================================
const SUPABASE_URL = window.ENV_SUPABASE_URL || '';
const SUPABASE_ANON_KEY = window.ENV_SUPABASE_ANON_KEY || '';

let sbClient;
try {
  sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
} catch(e) {
  console.error('Supabase 초기화 실패:', e);
}

// ====================================================
// 상태
// ====================================================
let courses = [];
let activeApplyId = null;
let activeInstId = null;
let activeDeleteId = null;

// ====================================================
// 유틸리티
// ====================================================
function hashPass(str) { return btoa(encodeURIComponent(str + '::salt::수강신청')); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function loading(on) {
  document.getElementById('loadingBar').classList.toggle('active', on);
}
function showMsg(id, html, type) {
  document.getElementById(id).innerHTML = `<div class="msg msg-${type}">${html}</div>`;
}

function genTimes() {
  const t = [];
  for (let h = 0; h < 24; h++)
    for (let m = 0; m < 60; m += 30)
      t.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);
  return t;
}
const ALL_TIMES = genTimes();

function syncTime(selectId, current) {
  const sel = document.getElementById(selectId);
  if (!sel) return;
  const cur = current || sel.value;
  sel.innerHTML = ALL_TIMES.map(t => `<option value="${t}"${t===cur?'selected':''}>${t}</option>`).join('');
}

function initDateInputs() {
  const today = new Date().toISOString().split('T')[0];
  ['f-openDate','f-lectureDate'].forEach(id => {
    const el = document.getElementById(id);
    if (el) { el.min = today; el.value = today; }
  });
  syncTime('f-openTime');
  syncTime('f-lectureTime');
}

function parseDt(date, time) {
  if (!date || !time) return null;
  const t = time.slice(0, 5);
  return new Date(`${date}T${t}:00`);
}
function fmtDt(dt) {
  if (!dt) return '-';
  return dt.toLocaleString('ko-KR', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}
function fmtLectureDt(dateStr, timeStr) {
  if (!dateStr) return '-';
  const base = new Date(dateStr).toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric' });
  return timeStr ? `${base} ${timeStr}` : base;
}
function getUntil(dt) {
  const d = dt - Date.now();
  if (d <= 0) return null;
  const h = Math.floor(d/3600000), m = Math.floor((d%3600000)/60000), s = Math.floor((d%60000)/1000);
  if (h > 23) { const days = Math.floor(d/86400000); return `${days}일 후 오픈`; }
  if (h > 0) return `${h}시간 ${m}분 후 오픈`;
  if (m > 0) return `${m}분 ${s}초 후 오픈`;
  return `${s}초 후 오픈`;
}

// ====================================================
// Supabase API
// ====================================================
async function loadCourses() {
  loading(true);
  try {
    const { data: coursesData, error: ce } = await sbClient
      .from('courses')
      .select('*')
      .order('created_at', { ascending: false });
    if (ce) throw ce;

    const { data: registrantsData, error: re } = await sbClient
      .from('registrants')
      .select('*')
      .order('applied_at', { ascending: true });
    if (re) throw re;

    courses = (coursesData || []).map(c => ({
      ...c,
      registrants: (registrantsData || []).filter(r => r.course_id === c.id)
    }));
  } catch(e) {
    console.error('강의 로드 실패:', e);
    courses = [];
  }
  loading(false);
  renderCourses();
}

async function apiAddCourse(data) {
  const { data: row, error } = await sbClient.from('courses').insert([data]).select().single();
  if (error) throw error;
  return row;
}

async function apiUpdateCourse(id, data) {
  const { error } = await sbClient.from('courses').update(data).eq('id', id);
  if (error) throw error;
}

async function apiDeleteCourse(id) {
  const { error } = await sbClient.from('courses').delete().eq('id', id);
  if (error) throw error;
}

async function apiAddRegistrant(courseId, name) {
  const { data: row, error } = await sbClient.from('registrants').insert([{
    course_id: courseId,
    name: name
  }]).select().single();
  if (error) throw error;
  return row;
}

// ====================================================
// 렌더링
// ====================================================
function renderCourses() {
  const list = document.getElementById('courseList');
  if (courses.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">📋</div><p>등록된 강의가 없습니다.<br>강의를 추가해 보세요.</p></div>`;
    return;
  }
  list.innerHTML = courses.map(c => {
    const openDt = parseDt(c.open_date, c.open_time);
    const now = Date.now();
    const isOpen = openDt && now >= openDt;
    const isFull = c.registrants.length >= c.max_limit;
    const pct = Math.min(100, Math.round((c.registrants.length / c.max_limit) * 100));
    const until = !isOpen && openDt ? getUntil(openDt) : null;

    let badge, applyBtn;
    if (isFull) {
      badge = `<span class="badge badge-full"><span class="badge-dot"></span>마감</span>`;
      applyBtn = `<button class="btn btn-apply disabled" disabled>신청 마감</button>`;
    } else if (isOpen) {
      badge = `<span class="badge badge-open"><span class="badge-dot"></span>신청 가능</span>`;
      applyBtn = `<button class="btn btn-apply" onclick="openApplyModal(${c.id})">수강신청</button>`;
    } else {
      badge = `<span class="badge badge-wait"><span class="badge-dot"></span>대기중</span>`;
      applyBtn = `<button class="btn btn-apply disabled" disabled>신청 대기</button>`;
    }

    return `
    <div class="course-card" id="card-${c.id}">
      <div class="card-top">
        <div class="card-title-row">
          <div class="card-title" onclick="openDetailModal(${c.id})">${esc(c.name)}</div>
          <div class="card-title-hint">
            <svg width="10" height="10" viewBox="0 0 16 16" fill="currentColor"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/></svg>
            클릭하여 강의 상세보기
          </div>
          <div class="card-meta">
            <span class="card-meta-item">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M8 1a7 7 0 1 1 0 14A7 7 0 0 1 8 1zm0 1a6 6 0 1 0 0 12A6 6 0 0 0 8 2zm.5 3v3.25l2.5 1.5-.5.866L7.5 9V6h1z"/></svg>
              신청 시작 ${fmtDt(openDt)}
            </span>
            <span class="card-meta-item">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M3.5 0a.5.5 0 0 1 .5.5V1h8V.5a.5.5 0 0 1 1 0V1h1a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2V3a2 2 0 0 1 2-2h1V.5a.5.5 0 0 1 .5-.5zM1 4v10a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V4H1z"/></svg>
              강의일 ${fmtLectureDt(c.lecture_date, c.lecture_time)}
            </span>
            <span class="card-meta-item">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M7 14s-1 0-1-1 1-4 5-4 5 3 5 4-1 1-1 1H7zm4-6a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path fill-rule="evenodd" d="M5.216 14A2.238 2.238 0 0 1 5 13c0-1.355.68-2.75 1.936-3.72A6.325 6.325 0 0 0 5 9c-4 0-5 3-5 4s1 1 1 1h4.216z"/><path d="M4.5 8a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5z"/></svg>
              정원 ${c.max_limit}명
            </span>
          </div>
        </div>
        ${badge}
      </div>
      <div class="card-body">
        <div class="progress-wrap">
          <div class="progress-track">
            <div class="progress-fill ${isFull?'full':''}" style="width:${pct}%"></div>
          </div>
          <div class="progress-label">
            <span>${c.registrants.length}/${c.max_limit}명 신청</span>
            ${until ? `<span class="countdown-label" id="cd-${c.id}">${until}</span>` : '<span></span>'}
          </div>
        </div>
      </div>
      <div class="card-footer">
        <button class="btn btn-outline-accent" onclick="openInstModal(${c.id})">강사 확인</button>
        <button class="btn btn-delete" onclick="openDeleteModal(${c.id})">삭제</button>
        ${applyBtn}
      </div>
    </div>`;
  }).join('');
}

// ====================================================
// 모달 제어
// ====================================================
function openModal(id) {
  const el = document.getElementById(id);
  el.style.display = 'flex';
  el.style.opacity = '0';
  requestAnimationFrame(() => { el.style.opacity = ''; el.style.animation = ''; });
}
function closeModal(id) {
  document.getElementById(id).style.display = 'none';
}
function backdropClose(e, id) {
  if (e.target === e.currentTarget) closeModal(id);
}

// ====================================================
// 강의 추가
// ====================================================
function openAddModal() {
  initDateInputs();
  ['f-pass','f-name','f-desc','f-limit'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  document.getElementById('addMsg').innerHTML = '';
  openModal('addModal');
  setTimeout(() => document.getElementById('f-pass').focus(), 100);
}

async function saveCourse() {
  const pass = document.getElementById('f-pass').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const desc = document.getElementById('f-desc').value.trim();
  const limit = parseInt(document.getElementById('f-limit').value);
  const openDate = document.getElementById('f-openDate').value;
  const openTime = document.getElementById('f-openTime').value;
  const lectureDate = document.getElementById('f-lectureDate').value;
  const lectureTime = document.getElementById('f-lectureTime').value;

  if (!pass) return showMsg('addMsg','비밀번호를 입력해주세요.','error');
  if (pass.length < 4) return showMsg('addMsg','비밀번호는 4자 이상이어야 합니다.','error');
  if (!name) return showMsg('addMsg','강의 이름을 입력해주세요.','error');
  if (!desc) return showMsg('addMsg','강의 내용을 입력해주세요.','error');
  if (!limit || limit < 1) return showMsg('addMsg','수강자 수를 올바르게 입력해주세요.','error');
  if (!openDate || !openTime) return showMsg('addMsg','수강신청 시작 날짜와 시간을 입력해주세요.','error');
  if (!lectureDate || !lectureTime) return showMsg('addMsg','강의 날짜와 시간을 입력해주세요.','error');

  loading(true);
  try {
    const row = await apiAddCourse({
      name, description: desc, max_limit: limit,
      open_date: openDate, open_time: openTime,
      lecture_date: lectureDate, lecture_time: lectureTime,
      pass_hash: hashPass(pass)
    });
    courses.unshift({ ...row, registrants: [] });
    closeModal('addModal');
    renderCourses();
  } catch(e) {
    showMsg('addMsg', '저장 중 오류가 발생했습니다: ' + e.message, 'error');
  }
  loading(false);
}

// ====================================================
// 수강신청
// ====================================================
function openApplyModal(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  activeApplyId = id;
  document.getElementById('applyModalTitle').textContent = c.name + ' — 수강신청';
  document.getElementById('a-name').value = '';
  document.getElementById('applyMsg').innerHTML = '';
  openModal('applyModal');
  setTimeout(() => document.getElementById('a-name').focus(), 100);
}

async function submitApply() {
  const c = courses.find(x => x.id === activeApplyId);
  if (!c) return;
  const name = document.getElementById('a-name').value.trim();
  if (!name) return showMsg('applyMsg','이름을 입력해주세요.','error');
  if (c.registrants.length >= c.max_limit) return showMsg('applyMsg','정원이 마감되었습니다.','error');
  if (c.registrants.find(r => r.name === name)) return showMsg('applyMsg','이미 신청하셨습니다.','error');

  loading(true);
  try {
    const row = await apiAddRegistrant(c.id, name);
    c.registrants.push(row);
    showMsg('applyMsg', `${esc(name)}님, 수강신청이 완료되었습니다! 🎉`, 'success');
    setTimeout(() => { closeModal('applyModal'); renderCourses(); }, 1200);
  } catch(e) {
    showMsg('applyMsg', '신청 중 오류가 발생했습니다: ' + e.message, 'error');
  }
  loading(false);
}

// ====================================================
// 강사 확인
// ====================================================
function openInstModal(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  activeInstId = id;
  document.getElementById('instModalTitle').textContent = c.name + ' — 강사 확인';
  document.getElementById('i-pass').value = '';
  document.getElementById('instMsg').innerHTML = '';
  document.getElementById('instPassSection').style.display = '';
  document.getElementById('instDashboard').style.display = 'none';
  document.getElementById('instListSection').innerHTML = '';
  document.getElementById('instEditSection').style.display = 'none';
  document.getElementById('instFooter').style.display = '';
  document.getElementById('instVerifyBtn').style.display = '';
  document.querySelectorAll('.inst-tab').forEach((t,i) => t.classList.toggle('active', i===0));
  openModal('instModal');
  setTimeout(() => document.getElementById('i-pass').focus(), 100);
}

function verifyInstructor() {
  const c = courses.find(x => x.id === activeInstId);
  if (!c) return;
  const pass = document.getElementById('i-pass').value;
  if (hashPass(pass) !== c.pass_hash) {
    return showMsg('instMsg','비밀번호가 올바르지 않습니다.','error');
  }
  document.getElementById('instPassSection').style.display = 'none';
  document.getElementById('instFooter').style.display = 'none';
  document.getElementById('instDashboard').style.display = '';
  renderInstList(c);
  prefillEdit(c);
}

function switchTab(tab) {
  document.querySelectorAll('.inst-tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='list')||(i===1&&tab==='edit')));
  document.getElementById('instListSection').style.display = tab==='list' ? '' : 'none';
  document.getElementById('instEditSection').style.display = tab==='edit' ? '' : 'none';
}

function renderInstList(c) {
  const sec = document.getElementById('instListSection');
  let html = `<div class="reg-count-bar"><span>총 수강신청자</span><div><strong>${c.registrants.length}</strong> / ${c.max_limit}명</div></div>`;
  if (c.registrants.length === 0) {
    html += `<div class="empty-reg">아직 신청자가 없습니다.</div>`;
  } else {
    html += `<div class="reg-list">` + c.registrants.map((r,i) => `
      <div class="reg-item">
        <span class="reg-num">${i+1}</span>
        <span class="reg-name">${esc(r.name)}</span>
        <span class="reg-time">${r.applied_at ? new Date(r.applied_at).toLocaleString('ko-KR', {month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}) : ''}</span>
      </div>`).join('') + `</div>`;
  }
  sec.innerHTML = html;
}

function prefillEdit(c) {
  document.getElementById('e-name').value = c.name;
  document.getElementById('e-desc').value = c.description;
  document.getElementById('e-limit').value = c.max_limit;
  document.getElementById('e-openDate').value = c.open_date;
  syncTime('e-openTime', c.open_time ? c.open_time.slice(0,5) : '09:00');
  document.getElementById('e-lectureDate').value = c.lecture_date;
  syncTime('e-lectureTime', c.lecture_time ? c.lecture_time.slice(0,5) : '09:00');
  document.getElementById('editMsg').innerHTML = '';
}

async function saveEdit() {
  const c = courses.find(x => x.id === activeInstId);
  if (!c) return;
  const name = document.getElementById('e-name').value.trim();
  const desc = document.getElementById('e-desc').value.trim();
  const limit = parseInt(document.getElementById('e-limit').value);
  const openDate = document.getElementById('e-openDate').value;
  const openTime = document.getElementById('e-openTime').value;
  const lectureDate = document.getElementById('e-lectureDate').value;
  const lectureTime = document.getElementById('e-lectureTime').value;

  if (!name) return showMsg('editMsg','강의 이름을 입력해주세요.','error');
  if (!desc) return showMsg('editMsg','강의 내용을 입력해주세요.','error');
  if (!limit || limit < 1) return showMsg('editMsg','수강자 수를 올바르게 입력해주세요.','error');
  if (limit < c.registrants.length) return showMsg('editMsg',`이미 ${c.registrants.length}명이 신청했습니다. 정원은 ${c.registrants.length}명 이상이어야 합니다.`,'error');
  if (!openDate || !openTime) return showMsg('editMsg','수강신청 시작 날짜와 시간을 입력해주세요.','error');
  if (!lectureDate || !lectureTime) return showMsg('editMsg','강의 날짜와 시간을 입력해주세요.','error');

  loading(true);
  try {
    await apiUpdateCourse(c.id, {
      name, description: desc, max_limit: limit,
      open_date: openDate, open_time: openTime,
      lecture_date: lectureDate, lecture_time: lectureTime
    });
    Object.assign(c, { name, description: desc, max_limit: limit, open_date: openDate, open_time: openTime, lecture_date: lectureDate, lecture_time: lectureTime });
    showMsg('editMsg','수정이 완료되었습니다.','success');
    document.getElementById('instModalTitle').textContent = c.name + ' — 강사 확인';
    renderCourses();
  } catch(e) {
    showMsg('editMsg', '수정 중 오류가 발생했습니다: ' + e.message, 'error');
  }
  loading(false);
}

// ====================================================
// 강의 상세
// ====================================================
function openDetailModal(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  const openDt = parseDt(c.open_date, c.open_time);
  const now = Date.now();
  const isOpen = openDt && now >= openDt;
  const isFull = c.registrants.length >= c.max_limit;
  const pct = Math.min(100, Math.round((c.registrants.length / c.max_limit) * 100));
  let badgeHtml;
  if (isFull) badgeHtml = `<span class="badge badge-full"><span class="badge-dot"></span>마감</span>`;
  else if (isOpen) badgeHtml = `<span class="badge badge-open"><span class="badge-dot"></span>신청 가능</span>`;
  else badgeHtml = `<span class="badge badge-wait"><span class="badge-dot"></span>대기중</span>`;

  document.getElementById('detailModalTitle').innerHTML = `${esc(c.name)}&nbsp;&nbsp;${badgeHtml}`;
  document.getElementById('detailModalBody').innerHTML = `
    <div class="detail-section">
      <div class="detail-label">강의 설명</div>
      <div class="detail-desc">${esc(c.description)}</div>
    </div>
    <div class="detail-section">
      <div class="detail-label">강의 정보</div>
      <div class="detail-meta-grid">
        <div class="detail-meta-card">
          <div class="dm-label">강의 날짜</div>
          <div class="dm-value" style="font-size:13px;font-weight:500;">${fmtLectureDt(c.lecture_date, c.lecture_time ? c.lecture_time.slice(0,5) : '')}</div>
        </div>
        <div class="detail-meta-card">
          <div class="dm-label">수강신청 시작</div>
          <div class="dm-value" style="font-size:12px;font-weight:500;">${fmtDt(openDt)}</div>
        </div>
        <div class="detail-meta-card">
          <div class="dm-label">총 정원</div>
          <div class="dm-value">${c.max_limit}명</div>
        </div>
        <div class="detail-meta-card">
          <div class="dm-label">현재 신청</div>
          <div class="dm-value">${c.registrants.length}명</div>
        </div>
      </div>
    </div>
    <div class="detail-section" style="margin-bottom:0">
      <div class="detail-label">신청 현황</div>
      <div class="detail-progress-track">
        <div class="detail-progress-fill ${isFull?'full':''}" style="width:${pct}%"></div>
      </div>
      <div style="font-size:12px;color:var(--muted);display:flex;justify-content:space-between;">
        <span>${c.registrants.length} / ${c.max_limit}명</span>
        <span>${pct}% 충원</span>
      </div>
    </div>
  `;
  openModal('detailModal');
}

// ====================================================
// 강의 삭제
// ====================================================
function openDeleteModal(id) {
  const c = courses.find(x => x.id === id);
  if (!c) return;
  activeDeleteId = id;
  document.getElementById('deleteModalTitle').textContent = '강의 삭제 — ' + c.name;
  document.getElementById('d-pass').value = '';
  document.getElementById('deleteMsg').innerHTML = '';
  document.getElementById('deletePassSection').style.display = '';
  document.getElementById('deleteConfirmSection').style.display = 'none';
  document.getElementById('deleteFooter').style.display = '';
  document.getElementById('deleteVerifyBtn').style.display = '';
  openModal('deleteModal');
  setTimeout(() => document.getElementById('d-pass').focus(), 100);
}

function verifyDelete() {
  const c = courses.find(x => x.id === activeDeleteId);
  if (!c) return;
  const pass = document.getElementById('d-pass').value;
  if (hashPass(pass) !== c.pass_hash) {
    return showMsg('deleteMsg', '비밀번호가 올바르지 않습니다.', 'error');
  }
  document.getElementById('deletePassSection').style.display = 'none';
  document.getElementById('deleteFooter').style.display = 'none';
  document.getElementById('deleteConfirmSection').style.display = '';
}

async function confirmDelete() {
  loading(true);
  try {
    await apiDeleteCourse(activeDeleteId);
    courses = courses.filter(x => x.id !== activeDeleteId);
    activeDeleteId = null;
    closeModal('deleteModal');
    renderCourses();
  } catch(e) {
    alert('삭제 중 오류가 발생했습니다: ' + e.message);
  }
  loading(false);
}

// ====================================================
// 카운트다운 타이머
// ====================================================
setInterval(() => {
  const now = Date.now();
  courses.forEach(c => {
    const openDt = parseDt(c.open_date, c.open_time);
    if (!openDt) return;
    const isOpen = now >= openDt;
    const cdEl = document.getElementById(`cd-${c.id}`);
    if (cdEl && !isOpen) {
      const until = getUntil(openDt);
      cdEl.textContent = until || '';
    }
    const card = document.getElementById(`card-${c.id}`);
    if (!card) return;
    const isFull = c.registrants.length >= c.max_limit;
    const badge = card.querySelector('.badge');
    const applyBtn = card.querySelector('.btn-apply');
    if (!badge || !applyBtn) return;
    if (isFull) {
      if (!badge.classList.contains('badge-full')) {
        badge.className = 'badge badge-full';
        badge.innerHTML = '<span class="badge-dot"></span>마감';
        applyBtn.disabled = true; applyBtn.classList.add('disabled'); applyBtn.textContent = '신청 마감';
        applyBtn.onclick = null;
      }
    } else if (isOpen) {
      if (!badge.classList.contains('badge-open')) {
        badge.className = 'badge badge-open';
        badge.innerHTML = '<span class="badge-dot"></span>신청 가능';
        applyBtn.disabled = false; applyBtn.classList.remove('disabled'); applyBtn.textContent = '수강신청';
        applyBtn.onclick = () => openApplyModal(c.id);
      }
    }
  });
}, 1000);

// ====================================================
// 초기 로드
// ====================================================
loadCourses();
</script>
</body>
</html>
